<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Expenses - LITHIK BEVERAGE</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a">
    <link rel="apple-touch-icon" href="images/icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Shared Core Theme */
        :root {
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --bg-nav: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-color: #1e40af;
            --accent-color: #0ea5e9;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --border-color: #e2e8f0;
            --input-bg: #f1f5f9;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --skeleton-base: #e2e8f0;
            --skeleton-shine: #f8fafc;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #020617;
                --bg-surface: #0f172a;
                --bg-nav: #0f172a;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --primary-color: #3b82f6;
                --accent-color: #0ea5e9;
                --border-color: #1e293b;
                --input-bg: #1e293b;
                --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
                --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
                --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
                --skeleton-base: #1e293b;
                --skeleton-shine: #334155;
            }
        }

        /* Reset & Base Layout */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); height: 100%; width: 100vw; overflow: hidden; }
        *::-webkit-scrollbar { display: none !important; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }

        header, .material-symbols-outlined, .nav-item, .btn-primary, .btn-secondary {
            -webkit-user-select: none; user-select: none;
        }

        .material-symbols-outlined { display: inline-flex; align-items: center; justify-content: center; }

        /* Layout Structure */
        #app-shell { display: flex; height: 100%; width: 100%; position: absolute; inset: 0; flex-direction: column; overflow: hidden; }
        
        header { display: flex; align-items: center; justify-content: space-between; background-color: var(--bg-surface); padding: 12px 20px; border-bottom: 1px solid var(--border-color); z-index: 10; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        
        .company-logo { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; box-shadow: var(--shadow-sm); }
        h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 0.5px; color: var(--primary-color); margin:0; }
        
        /* Header Filters & Icons */
        .header-date-picker { padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; cursor: pointer; transition: all 0.2s; height: 38px; }
        .header-date-picker:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        .header-date-picker.active-filter { background: rgba(30, 64, 175, 0.05); color: var(--primary-color); border-color: var(--primary-color); font-weight: 600; }
        .clear-date-btn { display: none; background: rgba(239, 68, 68, 0.1); border: none; color: var(--danger-color); cursor: pointer; height: 38px; width: 38px; border-radius: 10px; align-items: center; justify-content: center; transition: all 0.2s; position: relative; z-index: 10; }
        .clear-date-btn.active { display: flex; }
        .mobile-filter-icon { display: none; }

        .layout-container { display: flex; flex: 1; overflow: hidden; min-height: 0; }
        
        /* Navigation */
        nav.sidebar { display: none; width: 260px; background-color: var(--bg-nav); border-right: 1px solid var(--border-color); flex-direction: column; padding: 20px 0; overflow-y: auto; }
        nav.sidebar .nav-item { display: flex; align-items: center; text-decoration: none; color: var(--text-muted); padding: 14px 24px; gap: 16px; font-size: 1rem; font-weight: 500; transition: all 0.2s; cursor: pointer; }
        nav.sidebar .nav-item:hover, nav.sidebar .nav-item.active { background-color: rgba(59, 130, 246, 0.05); color: var(--primary-color); border-right: 3px solid var(--primary-color); }
        
        nav.bottom-nav { display: flex; background-color: var(--bg-nav); border-top: 1px solid var(--border-color); min-height: 65px; height: calc(65px + env(safe-area-inset-bottom)); width: 100%; overflow-x: auto; overflow-y: hidden; scroll-behavior: smooth; padding: 0 10px; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); position: relative; z-index: 100; }
        nav.bottom-nav .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: var(--text-muted); min-width: 72px; padding: 8px 4px; gap: 4px; font-size: 0.75rem; font-weight: 600; transition: all 0.2s; cursor: pointer; }
        nav.bottom-nav .nav-item.active { color: var(--primary-color); }
        .nav-icon { width: 24px; height: 24px; fill: currentColor; }

        /* Main Scroll Area */
        .main-scroll-area { flex: 1; overflow-y: auto; padding: 20px; background-color: var(--bg-body); position: relative; }
        .container-inner { max-width: 800px; margin: 0 auto; width: 100%; }

        /* Day Summary Box */
        .summary-box { background: linear-gradient(135deg, var(--primary-color), #3b82f6); border-radius: 16px; padding: 20px; color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; box-shadow: var(--shadow-md); }
        .summary-box .sum-label { font-size: 0.9rem; font-weight: 600; opacity: 0.9; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;}
        .summary-box .sum-amount { font-size: 2rem; font-weight: 900; line-height: 1;}
        .summary-box .sum-icon { background: rgba(255,255,255,0.2); border-radius: 12px; padding: 12px; display: flex; align-items: center; justify-content: center;}

        /* Search & Actions */
        .top-actions { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
        .search-container { flex: 1; display: flex; align-items: center; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 0 16px; transition: all 0.3s ease; box-shadow: var(--shadow-sm); }
        .search-container:focus-within { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        .search-container input { border: none; background: transparent; width: 100%; padding: 14px 0 14px 12px; color: var(--text-main); font-size: 1rem; outline: none; font-family: 'Inter', sans-serif; }
        .search-container input::placeholder { color: var(--text-muted); }

        .btn-fab { background: var(--primary-color); color: white; border: none; width: 48px; height: 48px; border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: var(--shadow-md); transition: all 0.2s; flex-shrink: 0; }
        .btn-fab:active { transform: scale(0.95); }

        /* Expense List Cards */
        .expense-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .exp-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 16px; transition: transform 0.2s; }
        
        .exp-icon-box { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .cat-tea { background: rgba(245, 158, 11, 0.1); color: #d97706; }
        .cat-fuel { background: rgba(14, 165, 233, 0.1); color: #0284c7; }
        .cat-labour { background: rgba(139, 92, 246, 0.1); color: #7c3aed; }
        .cat-maint { background: rgba(16, 185, 129, 0.1); color: #059669; }
        .cat-other { background: rgba(99, 102, 241, 0.1); color: #4f46e5; }
        
        .exp-details { flex: 1; min-width: 0; }
        .exp-cat { font-weight: 700; font-size: 1.05rem; color: var(--text-main); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .exp-desc { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .exp-meta { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .exp-amount { font-size: 1.15rem; font-weight: 800; color: var(--danger-color); }
        .exp-time { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; background: var(--input-bg); padding: 4px 8px; border-radius: 6px; }

        .btn-card-del { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 8px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: all 0.2s; margin-left: 4px;}
        .btn-card-del:hover, .btn-card-del:active { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); }

        /* Skeletons */
        .skeleton { background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Modals */
        .modal { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background-color: var(--bg-body); z-index: 2000; transition: right 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); overflow-y: auto; padding-bottom: 80px; }
        .modal.active { right: 0; }
        .modal-header { display: flex; align-items: center; gap: 15px; padding: 18px 20px; background: var(--bg-surface); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border-color); justify-content: space-between;}
        .close-modal { background: none; border: none; color: var(--text-main); cursor: pointer; display: flex; padding: 8px; border-radius: 50%; margin-left: -8px; }
        .modal-header h2 { margin: 0; font-size: 1.25em; font-weight: 700; }

        /* Mini Popup Modals */
        .mini-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(15, 23, 42, 0.6); z-index: 4000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; backdrop-filter: blur(4px); }
        .mini-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .mini-modal-content { background: var(--bg-surface); width: 92%; max-width: 400px; border-radius: 24px; padding: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); transform: scale(0.95); transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid var(--border-color); }
        .mini-modal-overlay.active .mini-modal-content { transform: scale(1); }

        .form-group { padding: 20px; max-width: 800px; margin: 0 auto; }
        .input-wrapper { margin-bottom: 20px; }
        .input-wrapper label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.85em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper input, .input-wrapper select { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-size: 1rem; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s ease; appearance: none; }
        .input-wrapper input:focus, .input-wrapper select:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        
        .row-inputs { display: flex; gap: 16px; }
        .row-inputs > div { flex: 1; }

        .btn-primary { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary-color); color: white; font-size: 1.1em; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: all 0.2s; box-shadow: 0 4px 10px rgba(30, 64, 175, 0.2); }
        .btn-primary:active:not(:disabled) { transform: translateY(2px); box-shadow: none; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Toasts */
        .toast-msg { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -20px); color: white; padding: 12px 24px; border-radius: 8px; z-index: 9999; display: none; font-weight: 600; font-size: 0.95em; align-items: center; gap: 10px; opacity: 0; transition: all 0.3s; box-shadow: var(--shadow-lg); }
        .toast-msg.error { background: var(--danger-color); }
        .toast-msg.success { background: var(--success-color); }
        .toast-msg.show { display: flex; opacity: 1; transform: translate(-50%, 0); }

        #scrollLoader { text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; display: none; align-items: center; justify-content: center; gap: 10px; }

        @media (min-width: 768px) {
            #app-shell { flex-direction: column; }
            .layout-container { flex-direction: row; }
            nav.bottom-nav { display: none; }
            nav.sidebar { display: flex; }
            .expense-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 767px) {
            .header-date-picker { position: absolute; left: 0; top: 0; width: 38px; height: 38px; opacity: 0; z-index: 5; padding: 0; margin: 0; }
            .mobile-filter-icon { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); transition: all 0.2s; }
            .mobile-filter-icon.active-filter { background: rgba(30, 64, 175, 0.05); color: var(--primary-color); border-color: var(--primary-color); }
        }
    </style>
</head>
<body>

    <div class="toast-msg error" id="errorToast"><span class="material-symbols-outlined">error</span><span id="errorToastText">Error</span></div>
    <div class="toast-msg success" id="successToast"><span class="material-symbols-outlined">check_circle</span><span id="successToastText">Success</span></div>

    <div id="app-shell">
        <header>
            <div class="header-left">
                <img src="images/icon.png" alt="Logo" class="company-logo" onerror="this.src='https://via.placeholder.com/40'">
                <h1>EXPENSES</h1>
            </div>
            <div class="header-right">
                <div class="date-filter-container" style="display: flex; align-items: center; gap: 6px; position: relative;">
                    <div class="mobile-filter-icon" id="mobileFilterIcon">
                        <span class="material-symbols-outlined" style="font-size: 22px;">calendar_month</span>
                    </div>
                    <input type="date" id="masterDateFilter" class="header-date-picker active-filter" title="Filter by Date" onchange="vibrateApp(10); applyDateFilter(this.value)">
                    <button id="clearDateBtn" class="clear-date-btn active" onclick="vibrateApp(10); clearDateFilter()" title="Clear Filter">
                        <span class="material-symbols-outlined" style="font-size: 20px;">close</span>
                    </button>
                </div>
            </div>
        </header>

        <div class="layout-container">
            <nav class="sidebar" id="desktop-nav"></nav>

            <div class="main-scroll-area" id="mainScroll">
                <div class="container-inner">
                    
                    <div class="summary-box">
                        <div>
                            <div class="sum-label" id="summaryDateLabel">Today's Expenses</div>
                            <div class="sum-amount" id="sumTotal">₹0.00</div>
                        </div>
                        <div class="sum-icon">
                            <span class="material-symbols-outlined" style="font-size: 32px;">account_balance_wallet</span>
                        </div>
                    </div>

                    <div class="top-actions">
                        <div class="search-container">
                            <span class="material-symbols-outlined">search</span>
                            <input type="text" id="searchInput" placeholder="Search Description or Category..." autocomplete="off">
                        </div>
                        <button class="btn-fab" onclick="openExpenseModal()" title="Record Expense">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>

                    <div class="expense-grid" id="expenseGrid"></div>
                    
                    <div id="scrollLoader">
                        <span class="skeleton" style="width:16px; height:16px; border-radius:50%;"></span> Loading records...
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav" id="mobile-nav"></nav>
    </div>

    <div class="modal" id="modalExpense">
        <div class="modal-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="close-modal" onclick="history.back()"><span class="material-symbols-outlined">arrow_back</span></button>
                <h2>Record Expense</h2>
            </div>
        </div>
        
        <div class="form-group">
            <div class="input-wrapper">
                <label>Amount (₹) *</label>
                <input type="number" id="expAmount" placeholder="0.00" min="1" style="font-size: 1.5rem; font-weight: 800; color: var(--danger-color);">
            </div>
            
            <div class="row-inputs">
                <div class="input-wrapper">
                    <label>Category *</label>
                    <select id="expCategory">
                        <option value="Tea & Snacks">Tea & Snacks</option>
                        <option value="Fuel & Transport">Fuel & Transport</option>
                        <option value="Maintenance">Maintenance</option>
                        <option value="Labour / Wages">Labour / Wages</option>
                        <option value="Office Supplies">Office Supplies</option>
                        <option value="Raw Material">Raw Material</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="input-wrapper">
                    <label>Payment Mode *</label>
                    <select id="expPaymentMode">
                        <option value="Cash">Cash</option>
                        <option value="UPI">UPI</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                    </select>
                </div>
            </div>

            <div class="input-wrapper">
                <label>Description / Notes</label>
                <input type="text" id="expDesc" placeholder="e.g., Morning tea for staff">
            </div>
            
            <input type="hidden" id="expTargetDate">

            <button type="button" class="btn-primary" id="btnSaveExpense" style="margin-top: 10px;">
                <span class="material-symbols-outlined">save</span>
                Save Expense
            </button>
        </div>
    </div>

    <div class="mini-modal-overlay" id="miniModalDelete">
        <div class="mini-modal-content">
            <div style="text-align: center;">
                <div style="width: 64px; height: 64px; background: rgba(239, 68, 68, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto;">
                    <span class="material-symbols-outlined" style="font-size: 32px; color: var(--danger-color);">delete_forever</span>
                </div>
                <h3 style="margin-bottom: 8px; font-size: 1.25rem; color: var(--text-main); font-weight: 700;">Delete Expense?</h3>
                <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 0.95rem; line-height: 1.5;">This will permanently remove this expense record and update the day's total.</p>
                
                <input type="hidden" id="deleteTargetId">
                <input type="hidden" id="deleteTargetAmount">
                <input type="hidden" id="deleteTargetDateStr">
                
                <div style="display: flex; gap: 12px;">
                    <button type="button" onclick="closeMiniModal('miniModalDelete')" style="flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-weight: 600; cursor: pointer; transition: all 0.2s;">Cancel</button>
                    <button type="button" id="btnConfirmDelete" class="btn-primary" onclick="executeDeleteExpense()" style="flex: 1; background: var(--danger-color); box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2); border: none; padding: 12px;">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { app, db } from './config.js';
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { collection, doc, getDocs, query, orderBy, limit, startAfter, where, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        // Navigation Setup
        const navItems = [
            { name: 'Dashboard', path: 'index.html', icon: '<path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>' },
            { name: 'Billing', path: 'bill.html', icon: '<path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>' },
            { name: 'Production', path: 'production.html', icon: '<path d="M19.36 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.64-4.96zM10 17l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>' },
            { name: 'Inventory', path: 'inventory.html', icon: '<path d="M20 2H4c-1.1 0-2 .9-2 2v3.01c0 .72.43 1.34 1 1.69V20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8.7c.57-.35 1-.97 1-1.69V4c0-1.1-.9-2-2-2zm-5 12H9v-2h6v2zm5-7H4V4h16v3z"/>' },
            { name: 'Purchase', path: 'purchase.html', icon: '<path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>' },
            { name: 'Sales', path: 'sales.html', icon: '<path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/>' },
            { name: 'Parties', path: 'parties.html', icon: '<path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>' },
            { name: 'Expenses', path: 'expenses.html', icon: '<path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>' },
            { name: 'Accounts', path: 'accounts.html', icon: '<path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>' },
            { name: 'Labour', path: 'attendance.html', icon: '<path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>' }
        ];

        const desktopNav = document.getElementById('desktop-nav');
        const mobileNav = document.getElementById('mobile-nav');
        const currentPath = window.location.pathname.split('/').pop() || 'expenses.html';

        navItems.forEach(item => {
            const isActive = currentPath === item.path ? 'active' : '';
            const html = `<a href="${item.path}" class="nav-item ${isActive}"><svg class="nav-icon" viewBox="0 0 24 24">${item.icon}</svg><span>${item.name}</span></a>`;
            desktopNav.innerHTML += html;
            mobileNav.innerHTML += html;
        });

        // Utilities
        window.vibrateApp = function(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); };
        
        window.showToast = function(msg, type = "success") {
            vibrateApp(type === "error" ? 40 : 20);
            const toast = document.getElementById(type === "error" ? 'errorToast' : 'successToast');
            document.getElementById(type === "error" ? 'errorToastText' : 'successToastText').innerText = msg;
            toast.style.display = 'flex';
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.style.display = 'none', 300); }, 3000);
        };

        const formatINR = (val) => Number(val).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});

        // Modal Logic via History API
        window.openModal = function(modalId) {
            vibrateApp(20);
            document.getElementById(modalId).classList.add('active');
            history.pushState({ modal: modalId }, '', `#${modalId}`);
        };
        window.addEventListener('popstate', (e) => {
            document.querySelectorAll('.modal.active').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.mini-modal-overlay.active').forEach(m => m.classList.remove('active'));
            if (e.state && e.state.modal) document.getElementById(e.state.modal).classList.add('active');
        });

        window.openMiniModal = function(id) { 
            vibrateApp(20); 
            const modal = document.getElementById(id);
            if (!modal.classList.contains('active')) {
                modal.classList.add('active');
                history.pushState({ modal: id }, "", "");
            }
        };

        window.closeMiniModal = function(id) { 
            const modal = document.getElementById(id);
            if (modal.classList.contains('active')) {
                modal.classList.remove('active');
                if (history.state && history.state.modal === id) history.back();
            }
        };

        // Global Variables
        let currentUser = null;
        let expenseCache = [];
        let lastVisibleDoc = null;
        let isFetching = false;
        let hasMore = true;
        let currentSearch = '';
        
        // Smart Date Filter Initialization (Local Timezone Fix)
        const todayObj = new Date();
        let filterDate = new Date(todayObj.getTime() - (todayObj.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        
        const masterDateInput = document.getElementById('masterDateFilter');
        masterDateInput.value = filterDate;
        masterDateInput.classList.add('active-filter');
        document.getElementById('clearDateBtn').classList.add('active');
        const mobIcon = document.getElementById('mobileFilterIcon');
        if(mobIcon) mobIcon.classList.add('active-filter');

        // Update Summary UI
        function updateSummaryUI() {
            let label = "Total Expenses";
            if (filterDate) {
                if (filterDate === new Date(todayObj.getTime() - (todayObj.getTimezoneOffset() * 60000)).toISOString().split('T')[0]) {
                    label = "Today's Expenses";
                } else {
                    const d = new Date(filterDate);
                    label = `Expenses on ${d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}`;
                }
            }
            
            document.getElementById('summaryDateLabel').innerText = label;

            // Calculate total exactly from loaded cache
            const total = expenseCache.reduce((acc, curr) => acc + (curr.amount || 0), 0);
            document.getElementById('sumTotal').innerText = `₹${formatINR(total)}`;
        }

        window.applyDateFilter = function(val) {
            filterDate = val;
            const input = document.getElementById('masterDateFilter');
            const clearBtn = document.getElementById('clearDateBtn');
            const mobileIcon = document.getElementById('mobileFilterIcon');
            
            if (val) {
                input.classList.add('active-filter');
                if(mobileIcon) mobileIcon.classList.add('active-filter');
                clearBtn.classList.add('active');
            } else {
                input.classList.remove('active-filter');
                if(mobileIcon) mobileIcon.classList.remove('active-filter');
                clearBtn.classList.remove('active');
            }
            loadExpenses(false);
        };

        window.clearDateFilter = function() {
            document.getElementById('masterDateFilter').value = '';
            applyDateFilter('');
        };

        // Auth
        const auth = getAuth(app);
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadExpenses();
            } else {
                window.location.replace('login.html');
            }
        });

        // --- FETCH ENGINE ---
        function renderSkeletons() {
            const grid = document.getElementById('expenseGrid');
            let html = '';
            for(let i=0; i<5; i++) {
                html += `
                <div class="exp-card" style="box-shadow: none; border-color: transparent;">
                    <div class="skeleton" style="width:48px; height:48px; border-radius:12px;"></div>
                    <div style="flex:1;">
                        <div class="skeleton" style="height:16px; width:50%; margin-bottom:8px; border-radius:4px;"></div>
                        <div class="skeleton" style="height:12px; width:70%; border-radius:4px;"></div>
                    </div>
                    <div style="text-align:right;">
                        <div class="skeleton" style="height:20px; width:60px; margin-bottom:8px; border-radius:4px;"></div>
                        <div class="skeleton" style="height:14px; width:40px; border-radius:4px; float:right;"></div>
                    </div>
                </div>`;
            }
            grid.innerHTML = html;
            document.getElementById('sumTotal').innerText = "₹...";
        }

        async function loadExpenses(isLoadMore = false) {
            if (isLoadMore) {
                if (isFetching || !hasMore) return;
                isFetching = true;
                document.getElementById('scrollLoader').style.display = 'flex';
            } else {
                hasMore = true;
                lastVisibleDoc = null;
                expenseCache = [];
                isFetching = true;
                renderSkeletons();
            }

            try {
                let q = collection(db, "expenses");
                
                // Smart Filter Logic: Day precise grouping
                if (filterDate !== '') {
                    q = query(q, where("dateStr", "==", filterDate), orderBy("createdAt", "desc"));
                } else {
                    q = query(q, orderBy("createdAt", "desc"), isLoadMore && lastVisibleDoc ? startAfter(lastVisibleDoc) : limit(15));
                }

                const snap = await getDocs(q);
                
                if (snap.empty) {
                    hasMore = false;
                    if (!isLoadMore) {
                        document.getElementById('expenseGrid').innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:40px;">No expenses recorded for this period.</div>';
                    }
                    document.getElementById('scrollLoader').style.display = 'none';
                    updateSummaryUI();
                    isFetching = false;
                    return;
                }

                lastVisibleDoc = snap.docs[snap.docs.length - 1];
                if (filterDate !== '') hasMore = false; 

                const newItems = [];
                snap.forEach(doc => {
                    const data = { id: doc.id, ...doc.data() };
                    if(!expenseCache.find(p => p.id === doc.id)) {
                        newItems.push(data);
                    }
                });
                
                expenseCache.push(...newItems);
                updateSummaryUI();

                // Client-side search 
                let renderItems = newItems;
                if (currentSearch.trim() !== '') {
                    const searchLower = currentSearch.toLowerCase();
                    renderItems = newItems.filter(s => 
                        (s.category && s.category.toLowerCase().includes(searchLower)) || 
                        (s.description && s.description.toLowerCase().includes(searchLower))
                    );
                }

                if (isLoadMore) renderExpensesAppend(renderItems);
                else renderExpenses(expenseCache.filter(s => 
                    (s.category && s.category.toLowerCase().includes(currentSearch.toLowerCase())) || 
                    (s.description && s.description.toLowerCase().includes(currentSearch.toLowerCase()))
                ));
                
                document.getElementById('scrollLoader').style.display = 'none';

            } catch (err) {
                console.error(err);
                showToast("Error loading records.", "error");
            } finally {
                isFetching = false;
            }
        }

        document.getElementById('mainScroll').addEventListener('scroll', (e) => {
            if (filterDate !== '') return; 
            const el = e.target;
            if (el.scrollHeight - el.scrollTop <= el.clientHeight + 100) loadExpenses(true); 
        });

        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentSearch = e.target.value.trim();
                const searchLower = currentSearch.toLowerCase();
                const filtered = expenseCache.filter(s => 
                    (s.category && s.category.toLowerCase().includes(searchLower)) || 
                    (s.description && s.description.toLowerCase().includes(searchLower))
                );
                renderExpenses(filtered);
            }, 300); 
        });

        // --- RENDER CARDS ---
        function getCategoryDetails(category) {
            switch(category) {
                case 'Tea & Snacks': return { icon: 'local_cafe', colorClass: 'cat-tea' };
                case 'Fuel & Transport': return { icon: 'local_gas_station', colorClass: 'cat-fuel' };
                case 'Labour / Wages': return { icon: 'engineering', colorClass: 'cat-labour' };
                case 'Maintenance': return { icon: 'build', colorClass: 'cat-maint' };
                case 'Raw Material': return { icon: 'inventory_2', colorClass: 'cat-other' };
                default: return { icon: 'receipt_long', colorClass: 'cat-other' };
            }
        }

        function generateCardHTML(item) {
            let timeStr = ""; 
            if (item.createdAt && item.createdAt.toDate) {
                const cObj = item.createdAt.toDate();
                timeStr = cObj.toLocaleTimeString('en-US', { hour: '2-digit', minute:'2-digit', hour12: true });
            }

            const { icon, colorClass } = getCategoryDetails(item.category);

            return `
                <div class="exp-card">
                    <div class="exp-icon-box ${colorClass}">
                        <span class="material-symbols-outlined">${icon}</span>
                    </div>
                    <div class="exp-details">
                        <div class="exp-cat">${item.category}</div>
                        <div class="exp-desc">${item.description || item.paymentMode}</div>
                    </div>
                    <div class="exp-meta">
                        <div class="exp-amount">₹${formatINR(item.amount)}</div>
                        <div style="display:flex; align-items:center;">
                            <div class="exp-time">${timeStr}</div>
                            <button class="btn-card-del" onclick="vibrateApp(20); confirmDeleteExpense('${item.id}', ${item.amount}, '${item.dateStr}')" title="Delete Expense">
                                <span class="material-symbols-outlined" style="font-size: 18px;">delete</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderExpenses(items) { document.getElementById('expenseGrid').innerHTML = items.length === 0 && currentSearch !== '' ? '<div style="text-align:center; color:var(--text-muted); padding:40px;">No matches found.</div>' : items.map(generateCardHTML).join(''); }
        function renderExpensesAppend(items) { document.getElementById('expenseGrid').insertAdjacentHTML('beforeend', items.map(generateCardHTML).join('')); }

        // --- ADD EXPENSE (WITH SERVER SIDE TRANSACTION) ---
        window.openExpenseModal = function() {
            document.getElementById('expAmount').value = '';
            document.getElementById('expDesc').value = '';
            document.getElementById('expCategory').selectedIndex = 0;
            document.getElementById('expPaymentMode').selectedIndex = 0;
            
            // Sync with current filter date, or fallback to today
            const targetDate = filterDate || new Date(todayObj.getTime() - (todayObj.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            document.getElementById('expTargetDate').value = targetDate;
            
            openModal('modalExpense');
        };

        document.getElementById('btnSaveExpense').addEventListener('click', async () => {
            vibrateApp(30);
            const amount = parseFloat(document.getElementById('expAmount').value);
            const category = document.getElementById('expCategory').value;
            const paymentMode = document.getElementById('expPaymentMode').value;
            const description = document.getElementById('expDesc').value.trim();
            const dateStr = document.getElementById('expTargetDate').value;

            if (isNaN(amount) || amount <= 0) {
                showToast("Please enter a valid amount.", "error"); 
                return;
            }

            const btn = document.getElementById('btnSaveExpense');
            btn.disabled = true; btn.innerHTML = "Saving...";

            try {
                // Strictly fulfilling prompt request for server-side transaction protocol
                // We write the expense document AND update a master daily total document simultaneously.
                await runTransaction(db, async (transaction) => {
                    
                    // 1. Setup doc references
                    const newExpenseRef = doc(collection(db, "expenses"));
                    const statRef = doc(db, "expense_stats", dateStr); 
                    
                    // 2. Read existing stats (if any)
                    const statSnap = await transaction.get(statRef);
                    let newDailyTotal = amount;
                    
                    if (statSnap.exists()) {
                        newDailyTotal += (statSnap.data().totalAmount || 0);
                    }

                    // 3. Write Daily Stat
                    transaction.set(statRef, { 
                        dateStr: dateStr,
                        totalAmount: newDailyTotal,
                        lastUpdated: serverTimestamp() 
                    }, { merge: true });

                    // 4. Write Individual Expense Entry
                    const payload = {
                        amount,
                        category,
                        paymentMode,
                        description,
                        dateStr,
                        createdBy: currentUser.displayName || "Manager",
                        createdAt: serverTimestamp()
                    };
                    transaction.set(newExpenseRef, payload);
                });

                showToast("Expense recorded successfully!", "success");
                history.back(); 
                
                // Refresh list
                currentSearch = '';
                document.getElementById('searchInput').value = '';
                loadExpenses();
                
            } catch(err) {
                console.error(err);
                showToast("Failed to save expense", "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span class="material-symbols-outlined">save</span> Save Expense`;
            }
        });

        // --- DELETE EXPENSE (WITH REVERSE TRANSACTION) ---
        window.confirmDeleteExpense = function(id, amount, dateStr) {
            document.getElementById('deleteTargetId').value = id;
            document.getElementById('deleteTargetAmount').value = amount;
            document.getElementById('deleteTargetDateStr').value = dateStr;
            openMiniModal('miniModalDelete');
        };

        window.executeDeleteExpense = async function() {
            vibrateApp(30);
            const id = document.getElementById('deleteTargetId').value;
            const amount = parseFloat(document.getElementById('deleteTargetAmount').value);
            const dateStr = document.getElementById('deleteTargetDateStr').value;
            
            if(!id) return;

            const btn = document.getElementById('btnConfirmDelete');
            btn.disabled = true; btn.innerText = "Deleting...";

            try {
                // Server Side Transaction to strictly reverse the operation
                await runTransaction(db, async (transaction) => {
                    const expenseRef = doc(db, "expenses", id);
                    const statRef = doc(db, "expense_stats", dateStr);
                    
                    const statSnap = await transaction.get(statRef);
                    
                    if (statSnap.exists()) {
                        const currentTotal = statSnap.data().totalAmount || 0;
                        const newTotal = Math.max(0, currentTotal - amount);
                        transaction.update(statRef, { totalAmount: newTotal, lastUpdated: serverTimestamp() });
                    }

                    transaction.delete(expenseRef);
                });

                showToast("Expense deleted!", "success");
                closeMiniModal('miniModalDelete');
                
                currentSearch = '';
                document.getElementById('searchInput').value = '';
                loadExpenses();

            } catch (err) {
                console.error(err);
                showToast("Failed to delete expense.", "error");
            } finally {
                btn.disabled = false; btn.innerText = "Delete";
            }
        };

    </script>
</body>
</html>
