<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Parties & Pending Credits - LITHIK BEVERAGE</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a">
    <link rel="apple-touch-icon" href="images/icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Shared Core Theme */
        :root {
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --bg-nav: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-color: #1e40af;
            --accent-color: #0ea5e9;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --border-color: #e2e8f0;
            --input-bg: #f1f5f9;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --skeleton-base: #e2e8f0;
            --skeleton-shine: #f8fafc;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #020617;
                --bg-surface: #0f172a;
                --bg-nav: #0f172a;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --primary-color: #3b82f6;
                --accent-color: #0ea5e9;
                --border-color: #1e293b;
                --input-bg: #1e293b;
                --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
                --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
                --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
                --skeleton-base: #1e293b;
                --skeleton-shine: #334155;
            }
        }

        /* Reset & Base Layout */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); height: 100%; width: 100vw; overflow: hidden; }
        *::-webkit-scrollbar { display: none !important; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }

        header, .material-symbols-outlined, .nav-item, .btn-primary, .btn-secondary {
            -webkit-user-select: none; user-select: none;
        }

        .material-symbols-outlined { display: inline-flex; align-items: center; justify-content: center; }

        /* Layout Structure */
        #app-shell { display: flex; height: 100%; width: 100%; position: absolute; inset: 0; flex-direction: column; overflow: hidden; }
        
        header { display: flex; align-items: center; justify-content: space-between; background-color: var(--bg-surface); padding: 12px 20px; border-bottom: 1px solid var(--border-color); z-index: 10; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        
        .company-logo { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; box-shadow: var(--shadow-sm); }
        h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 0.5px; color: var(--primary-color); margin:0; text-transform: uppercase; }

        .layout-container { display: flex; flex: 1; overflow: hidden; min-height: 0; }
        
        /* Navigation */
        nav.sidebar { display: none; width: 260px; background-color: var(--bg-nav); border-right: 1px solid var(--border-color); flex-direction: column; padding: 20px 0; overflow-y: auto; }
        nav.sidebar .nav-item { display: flex; align-items: center; text-decoration: none; color: var(--text-muted); padding: 14px 24px; gap: 16px; font-size: 1rem; font-weight: 500; transition: all 0.2s; cursor: pointer; }
        nav.sidebar .nav-item:hover, nav.sidebar .nav-item.active { background-color: rgba(59, 130, 246, 0.05); color: var(--primary-color); border-right: 3px solid var(--primary-color); }
        
        nav.bottom-nav { display: flex; background-color: var(--bg-nav); border-top: 1px solid var(--border-color); min-height: 65px; height: calc(65px + env(safe-area-inset-bottom)); width: 100%; overflow-x: auto; overflow-y: hidden; scroll-behavior: smooth; padding: 0 10px; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); position: relative; z-index: 100; }
        nav.bottom-nav .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: var(--text-muted); min-width: 72px; padding: 8px 4px; gap: 4px; font-size: 0.75rem; font-weight: 600; transition: all 0.2s; cursor: pointer; }
        nav.bottom-nav .nav-item.active { color: var(--primary-color); }
        .nav-icon { width: 24px; height: 24px; fill: currentColor; }

        /* Main Scroll Area */
        .main-scroll-area { flex: 1; overflow-y: auto; padding: 20px; background-color: var(--bg-body); position: relative; }
        .container-inner { max-width: 800px; margin: 0 auto; width: 100%; }

        /* Search */
        .top-actions { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
        .search-container { flex: 1; display: flex; align-items: center; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 0 16px; transition: all 0.3s ease; box-shadow: var(--shadow-sm); }
        .search-container:focus-within { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        .search-container input { border: none; background: transparent; width: 100%; padding: 14px 0 14px 12px; color: var(--text-main); font-size: 1rem; outline: none; font-family: 'Inter', sans-serif; }
        .search-container input::placeholder { color: var(--text-muted); }

        /* Credit List Cards (Adapted from Sales) */
        .sales-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .sale-card { background: var(--bg-surface); border: 1px solid var(--warning-color); border-radius: 16px; padding: 20px; box-shadow: var(--shadow-sm); position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 16px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .sale-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .sale-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--warning-color); }
        
        .sc-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .sc-inv { font-weight: 800; font-size: 1.15rem; color: var(--primary-color); margin-bottom: 4px; display: inline-flex; align-items: center; gap: 4px; }
        .sc-customer { font-size: 0.95rem; color: var(--text-main); font-weight: 600; display: flex; align-items: center; gap: 6px; margin-bottom: 4px;}
        
        .sc-date { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; background: var(--input-bg); padding: 4px 8px; border-radius: 6px; text-align: right;}
        .badge-pay { font-size: 0.7rem; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block;}
        .pay-credit { background: rgba(245, 158, 11, 0.1); color: var(--warning-color); border: 1px solid rgba(245, 158, 11, 0.2); }

        .sc-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 12px; }
        .sc-total { font-size: 1.4rem; font-weight: 900; color: var(--danger-color); display: flex; flex-direction: column;}
        .sc-total span { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 2px; }
        
        .receive-prompt { display: flex; align-items: center; gap: 6px; color: var(--success-color); font-weight: 700; font-size: 0.85rem; background: rgba(16, 185, 129, 0.1); padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(16, 185, 129, 0.2); }

        /* Skeletons */
        .skeleton { background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Mini Popup Modals */
        .mini-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(15, 23, 42, 0.6); z-index: 4000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; backdrop-filter: blur(4px); }
        .mini-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .mini-modal-content { background: var(--bg-surface); width: 92%; max-width: 400px; border-radius: 24px; padding: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); transform: scale(0.95); transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid var(--border-color); }
        .mini-modal-overlay.active .mini-modal-content { transform: scale(1); }

        .btn-primary { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary-color); color: white; font-size: 1.1em; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: all 0.2s; box-shadow: 0 4px 10px rgba(30, 64, 175, 0.2); }
        .btn-primary:active:not(:disabled) { transform: translateY(2px); box-shadow: none; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .index-link-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 14px; background: rgba(14, 165, 233, 0.1); border: 1px solid rgba(14, 165, 233, 0.3); color: var(--accent-color); border-radius: 12px; font-weight: 700; text-decoration: none; margin-bottom: 10px; transition: all 0.2s; }
        .index-link-btn:active { transform: scale(0.98); }

        /* Toasts */
        .toast-msg { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -20px); color: white; padding: 12px 24px; border-radius: 8px; z-index: 9999; display: none; font-weight: 600; font-size: 0.95em; align-items: center; gap: 10px; opacity: 0; transition: all 0.3s; box-shadow: var(--shadow-lg); }
        .toast-msg.error { background: var(--danger-color); }
        .toast-msg.success { background: var(--success-color); }
        .toast-msg.show { display: flex; opacity: 1; transform: translate(-50%, 0); }

        #scrollLoader { text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; display: none; align-items: center; justify-content: center; gap: 10px; }

        @media (min-width: 768px) {
            #app-shell { flex-direction: column; }
            .layout-container { flex-direction: row; }
            nav.bottom-nav { display: none; }
            nav.sidebar { display: flex; }
            .sales-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="toast-msg error" id="errorToast"><span class="material-symbols-outlined">error</span><span id="errorToastText">Error</span></div>
    <div class="toast-msg success" id="successToast"><span class="material-symbols-outlined">check_circle</span><span id="successToastText">Success</span></div>

    <div id="app-shell">
        <header>
            <div class="header-left">
                <img src="images/icon.png" alt="Logo" class="company-logo" onerror="this.src='https://via.placeholder.com/40'">
                <h1>PARTIES</h1>
            </div>
        </header>

        <div class="layout-container">
            <nav class="sidebar" id="desktop-nav"></nav>

            <div class="main-scroll-area" id="mainScroll">
                <div class="container-inner">
                    
                    <div class="top-actions">
                        <div class="search-container">
                            <span class="material-symbols-outlined">search</span>
                            <input type="text" id="searchInput" placeholder="Search Customer, Bill No..." autocomplete="off">
                        </div>
                    </div>

                    <div class="sales-grid" id="salesGrid">
                        <!-- Cards injected via JS -->
                    </div>
                    
                    <div id="scrollLoader">
                        <span class="skeleton" style="width:16px; height:16px; border-radius:50%;"></span> Loading pending credits...
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav" id="mobile-nav"></nav>
    </div>

    <!-- MARK RECEIVED CONFIRMATION MODAL -->
    <div class="mini-modal-overlay" id="miniModalReceive">
        <div class="mini-modal-content">
            <div style="text-align: center;">
                <div style="width: 64px; height: 64px; background: rgba(16, 185, 129, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto;">
                    <span class="material-symbols-outlined" style="font-size: 32px; color: var(--success-color);">task_alt</span>
                </div>
                <h3 style="margin-bottom: 8px; font-size: 1.25rem; color: var(--text-main); font-weight: 700;">Payment Received?</h3>
                <p style="color: var(--text-muted); margin-bottom: 12px; font-size: 0.95rem; line-height: 1.5;">Mark invoice <strong id="receiveInvNo" style="color: var(--primary-color);"></strong> as fully paid by <strong id="receiveCustName"></strong>.</p>
                <div style="font-size: 1.5rem; font-weight: 900; color: var(--success-color); margin-bottom: 24px;" id="receiveAmount">₹0.00</div>
                
                <input type="hidden" id="receiveTargetId">
                
                <div style="display: flex; gap: 12px;">
                    <button type="button" onclick="closeMiniModal('miniModalReceive')" style="flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-weight: 600; cursor: pointer; transition: all 0.2s;">Cancel</button>
                    <button type="button" id="btnConfirmReceive" class="btn-primary" onclick="executeMarkReceived()" style="flex: 1; background: var(--success-color); box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2); border: none; padding: 12px;">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <!-- DYNAMIC INDEX ERROR MODAL -->
    <div class="mini-modal-overlay" id="miniModalIndexError">
        <div class="mini-modal-content" style="max-width: 460px; width: 92%;">
            <div style="text-align: center;">
                <div style="width: 64px; height: 64px; background: rgba(245, 158, 11, 0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto;">
                    <span class="material-symbols-outlined" style="font-size: 32px; color: var(--warning-color);">database</span>
                </div>
                <h3 style="margin-bottom: 8px; font-size: 1.25rem; color: var(--text-main); font-weight: 700;">Database Index Required</h3>
                <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 0.9rem; line-height: 1.5;">Firebase needs a composite index to run this query. Click the link(s) below to auto-generate them in your console:</p>
                
                <div id="indexLinksContainer" style="margin-bottom: 20px; text-align: left;">
                    <!-- Links injected here -->
                </div>
                
                <button type="button" onclick="closeMiniModal('miniModalIndexError')" style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-weight: 600; cursor: pointer; transition: all 0.2s;">Dismiss</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { app, db } from './config.js';
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { collection, doc, getDocs, query, orderBy, limit, startAfter, where, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        // Navigation Setup
        const navItems = [
            { name: 'Dashboard', path: 'index.html', icon: '<path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>' },
            { name: 'Billing', path: 'bill.html', icon: '<path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>' },
            { name: 'Production', path: 'production.html', icon: '<path d="M19.36 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.64-4.96zM10 17l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>' },
            { name: 'Filling', path: 'filling.html', icon: '<path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2c0-3.32-2.67-7.25-8-11.8z"/>' },
            { name: 'Inventory', path: 'inventory.html', icon: '<path d="M20 2H4c-1.1 0-2 .9-2 2v3.01c0 .72.43 1.34 1 1.69V20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8.7c.57-.35 1-.97 1-1.69V4c0-1.1-.9-2-2-2zm-5 12H9v-2h6v2zm5-7H4V4h16v3z"/>' },
            { name: 'Purchase', path: 'purchase.html', icon: '<path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>' },
            { name: 'Sales', path: 'sales.html', icon: '<path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/>' },
            { name: 'Parties', path: 'parties.html', icon: '<path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>' },
            { name: 'Expenses', path: 'expenses.html', icon: '<path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>' },
            { name: 'Accounts', path: 'accounts.html', icon: '<path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>' },
            { name: 'Labour', path: 'attendance.html', icon: '<path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>' }
        ];

        const desktopNav = document.getElementById('desktop-nav');
        const mobileNav = document.getElementById('mobile-nav');
        const currentPath = window.location.pathname.split('/').pop() || 'parties.html';

        navItems.forEach(item => {
            const isActive = currentPath === item.path ? 'active' : '';
            const html = `<a href="${item.path}" class="nav-item ${isActive}"><svg class="nav-icon" viewBox="0 0 24 24">${item.icon}</svg><span>${item.name}</span></a>`;
            desktopNav.innerHTML += html;
            mobileNav.innerHTML += html;
        });

        // Utilities
        window.vibrateApp = function(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); };
        
        window.showToast = function(msg, type = "success") {
            vibrateApp(type === "error" ? 40 : 20);
            const toast = document.getElementById(type === "error" ? 'errorToast' : 'successToast');
            document.getElementById(type === "error" ? 'errorToastText' : 'successToastText').innerText = msg;
            toast.style.display = 'flex';
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.style.display = 'none', 300);
            }, 3000);
        };

        const formatINR = (val) => Number(val).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});

        // Smart Back-Button Support Modals
        window.openMiniModal = function(id) { 
            vibrateApp(20); 
            const modal = document.getElementById(id);
            if (!modal.classList.contains('active')) {
                modal.classList.add('active');
                history.pushState({ modal: id }, "", "");
            }
        };

        window.closeMiniModal = function(id) { 
            const modal = document.getElementById(id);
            if (modal.classList.contains('active')) {
                modal.classList.remove('active');
                if (history.state && history.state.modal === id) {
                    history.back();
                }
            }
        };

        window.addEventListener('popstate', (e) => {
            document.querySelectorAll('.mini-modal-overlay.active').forEach(m => m.classList.remove('active'));
        });

        // Dynamic Firebase Index Error Interceptor
        window.handleFirestoreError = function(e) {
            console.error(e);
            const errStr = e.toString() || e.message || "";
            const links = errStr.match(/https:\/\/console\.firebase\.google\.com[^\s]*/g);
            
            if (links && links.length > 0) {
                const container = document.getElementById('indexLinksContainer');
                container.innerHTML = '';
                
                links.forEach((link, idx) => {
                    const cleanLink = link.replace(/[.,;)]+$/, ""); // Remove trailing punctuation
                    container.innerHTML += `
                        <a href="${cleanLink}" target="_blank" class="index-link-btn">
                            <span>Auto-Build Index #${idx + 1}</span>
                            <span class="material-symbols-outlined">open_in_new</span>
                        </a>
                    `;
                });
                
                openMiniModal('miniModalIndexError');
            } else {
                window.showToast("Failed to load data. Please check connection.", "error");
            }
        };

        // Global Variables
        let currentUser = null;
        let creditCache = [];
        let lastVisibleDoc = null;
        let isFetching = false;
        let hasMore = true;
        let currentSearch = '';

        // Auth
        const auth = getAuth(app);
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadPendingCredits();
            } else {
                window.location.replace('login.html');
            }
        });

        // Fetch Data
        function renderSkeletons() {
            const grid = document.getElementById('salesGrid');
            let html = '';
            for(let i=0; i<4; i++) {
                html += `
                <div class="sale-card" style="box-shadow: none; border-color: transparent; background: var(--input-bg);">
                    <div class="skeleton" style="height:20px; width:60%; margin-bottom:12px; border-radius:4px;"></div>
                    <div class="skeleton" style="height:14px; width:40%; margin-bottom:20px; border-radius:4px;"></div>
                    <div style="display:flex; justify-content:space-between;">
                        <div class="skeleton" style="height:35px; width:30%; border-radius:4px;"></div>
                        <div class="skeleton" style="height:35px; width:20%; border-radius:12px;"></div>
                    </div>
                </div>`;
            }
            grid.innerHTML = html;
        }

        async function loadPendingCredits(isLoadMore = false) {
            if (isLoadMore) {
                if (isFetching || !hasMore) return;
                isFetching = true;
                document.getElementById('scrollLoader').style.display = 'flex';
            } else {
                hasMore = true;
                lastVisibleDoc = null;
                creditCache = [];
                isFetching = true;
                renderSkeletons();
            }

            try {
                let queryConstraints = [
                    where("paymentMode", "==", "Credit"),
                    where("creditStatus", "==", "Pending"),
                    orderBy("createdAt", "desc") // Ensure an index exists for paymentMode, creditStatus, and createdAt
                ];

                if (lastVisibleDoc) {
                    queryConstraints.push(startAfter(lastVisibleDoc));
                }
                
                queryConstraints.push(limit(10));
                
                const q = query(collection(db, "sales"), ...queryConstraints);
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    hasMore = false;
                    if (!isLoadMore) {
                        document.getElementById('salesGrid').innerHTML = `
                            <div style="text-align:center; padding: 40px 20px; color:var(--text-muted);">
                                <span class="material-symbols-outlined" style="font-size: 48px; opacity: 0.3; margin-bottom: 10px;">verified</span>
                                <h3>All Caught Up!</h3>
                                <p style="font-size: 0.9em; margin-top: 5px;">There are no pending credit invoices to collect.</p>
                            </div>
                        `;
                    }
                } else {
                    lastVisibleDoc = snap.docs[snap.docs.length - 1];
                    if (snap.docs.length < 10) hasMore = false;

                    const newItems = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    if (!isLoadMore) {
                        creditCache = newItems;
                    } else {
                        creditCache = [...creditCache, ...newItems];
                    }

                    // Client-Side Search Application
                    applyClientSideSearch();
                }

            } catch (error) {
                handleFirestoreError(error);
                if (!isLoadMore) {
                    document.getElementById('salesGrid').innerHTML = '';
                }
            } finally {
                isFetching = false;
                document.getElementById('scrollLoader').style.display = 'none';
            }
        }

        function applyClientSideSearch() {
            if (currentSearch.trim() === '') {
                renderCards(creditCache);
                return;
            }

            const searchLower = currentSearch.toLowerCase();
            const filtered = creditCache.filter(item => 
                (item.invoiceNo && item.invoiceNo.toLowerCase().includes(searchLower)) || 
                (item.customer && item.customer.name && item.customer.name.toLowerCase().includes(searchLower))
            );

            if (filtered.length === 0) {
                document.getElementById('salesGrid').innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:40px;">No pending credits match your search.</div>';
            } else {
                renderCards(filtered);
            }
        }

        function renderCards(items) {
            const grid = document.getElementById('salesGrid');
            grid.innerHTML = '';
            
            items.forEach(item => {
                let dStr = "N/A";
                if (item.date && item.date.toDate) {
                    const dObj = item.date.toDate();
                    dStr = `${dObj.getDate().toString().padStart(2, '0')}-${(dObj.getMonth()+1).toString().padStart(2, '0')}-${dObj.getFullYear()}`;
                }

                const cName = item.customer && item.customer.name ? item.customer.name : 'Unknown Customer';
                const cPhone = item.customer && item.customer.phone ? item.customer.phone : 'N/A';
                const grand = item.totals ? item.totals.grand : 0;
                
                // Only direct Call Button via HTML anchor
                const callBtn = item.customer && item.customer.phone ? 
                    `<a href="tel:${item.customer.phone}" class="receive-prompt" style="background: rgba(14, 165, 233, 0.1); color: var(--accent-color); border-color: rgba(14, 165, 233, 0.2); text-decoration: none;" onclick="event.stopPropagation();">
                        <span class="material-symbols-outlined" style="font-size: 18px;">call</span>
                    </a>` : '';

                const html = `
                    <div class="sale-card" onclick="promptMarkReceived('${item.id}')">
                        <div class="sc-header">
                            <div class="sc-inv">${item.invoiceNo}</div>
                            <div class="sc-date">${dStr}</div>
                        </div>
                        <div>
                            <div class="sc-customer"><span class="material-symbols-outlined" style="font-size: 18px; color: var(--text-muted);">person</span> ${cName}</div>
                            <div style="font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; gap: 8px;">
                                <span class="material-symbols-outlined" style="font-size: 16px;">call</span> ${cPhone}
                            </div>
                            <div style="margin-top: 12px;">
                                <div class="badge-pay pay-credit">Pending Credit</div>
                            </div>
                        </div>
                        <div class="sc-footer">
                            <div class="sc-total">
                                <span>Amount Due</span>
                                ₹${formatINR(grand)}
                            </div>
                            <div style="display: flex; gap: 10px;">
                                ${callBtn}
                                <div class="receive-prompt">
                                    <span class="material-symbols-outlined" style="font-size: 20px;">payments</span> Receive
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', html);
            });
        }

        // Receive Workflow
        window.promptMarkReceived = function(id) {
            const item = creditCache.find(c => c.id === id);
            if (!item) return;

            document.getElementById('receiveTargetId').value = id;
            document.getElementById('receiveInvNo').innerText = item.invoiceNo;
            document.getElementById('receiveCustName').innerText = item.customer?.name || 'Customer';
            document.getElementById('receiveAmount').innerText = `₹${formatINR(item.totals?.grand || 0)}`;

            openMiniModal('miniModalReceive');
        };

        window.executeMarkReceived = async function() {
            vibrateApp(30);
            const id = document.getElementById('receiveTargetId').value;
            if(!id) return;

            const btn = document.getElementById('btnConfirmReceive');
            btn.disabled = true; 
            btn.innerText = "Processing...";

            try {
                const docRef = doc(db, "sales", id);
                await updateDoc(docRef, {
                    creditStatus: "Received",
                    receivedAt: serverTimestamp(),
                    receivedBy: currentUser?.displayName || "Staff Member"
                });

                showToast("Payment Marked as Received!", "success");
                
                // Remove from local cache and UI instantly
                creditCache = creditCache.filter(c => c.id !== id);
                applyClientSideSearch();
                
                closeMiniModal('miniModalReceive');

            } catch (err) {
                console.error("Update failed: ", err);
                showToast("Failed to mark as received. Check connection.", "error");
            } finally {
                btn.disabled = false; 
                btn.innerText = "Confirm";
            }
        };

        // Search Input Handling (Debounced Client-Side)
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            currentSearch = e.target.value.trim();
            searchTimeout = setTimeout(() => {
                applyClientSideSearch();
            }, 300);
        });

        // Infinite Scroll
        document.getElementById('mainScroll').addEventListener('scroll', (e) => {
            if (currentSearch !== '') return; // Don't infinite scroll while searching local cache
            const { scrollTop, scrollHeight, clientHeight } = e.target;
            if (scrollTop + clientHeight >= scrollHeight - 50) {
                loadPendingCredits(true);
            }
        });

    </script>
</body>
</html>
