<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Parties Directory - LITHIK BEVERAGE</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a">
    <link rel="apple-touch-icon" href="images/icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Shared Core Theme */
        :root {
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --bg-nav: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-color: #1e40af;
            --accent-color: #0ea5e9;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --border-color: #e2e8f0;
            --input-bg: #f1f5f9;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --skeleton-base: #e2e8f0;
            --skeleton-shine: #f8fafc;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #020617;
                --bg-surface: #0f172a;
                --bg-nav: #0f172a;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --primary-color: #3b82f6;
                --accent-color: #0ea5e9;
                --border-color: #1e293b;
                --input-bg: #1e293b;
                --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.5);
                --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
                --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
                --skeleton-base: #1e293b;
                --skeleton-shine: #334155;
            }
        }

        /* Reset & Base Layout */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); height: 100%; width: 100vw; overflow: hidden; }
        *::-webkit-scrollbar { display: none !important; }
        * { -ms-overflow-style: none !important; scrollbar-width: none !important; }

        header, .material-symbols-outlined, .nav-item, .btn-primary, .btn-secondary {
            -webkit-user-select: none; user-select: none;
        }

        .material-symbols-outlined { display: inline-flex; align-items: center; justify-content: center; }

        /* Layout Structure */
        #app-shell { display: flex; height: 100%; width: 100%; position: absolute; inset: 0; flex-direction: column; overflow: hidden; }
        
        header { display: flex; align-items: center; justify-content: space-between; background-color: var(--bg-surface); padding: 12px 20px; border-bottom: 1px solid var(--border-color); z-index: 10; flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        
        .company-logo { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; box-shadow: var(--shadow-sm); }
        h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 0.5px; color: var(--primary-color); margin:0; text-transform: uppercase; }
        
        /* Type Segment Filters */
        .filter-toggle { display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-muted); cursor: pointer; transition: all 0.2s; position: relative; }
        .filter-toggle.active { background: rgba(30, 64, 175, 0.1); color: var(--primary-color); border-color: var(--primary-color); }
        @media (prefers-color-scheme: dark) {
            .filter-toggle.active { background: rgba(59, 130, 246, 0.15); color: var(--primary-color); }
        }
        .filter-badge { position: absolute; top: -4px; right: -4px; background: var(--danger-color); width: 10px; height: 10px; border-radius: 50%; display: none; }
        .filter-toggle.active .filter-badge { display: block; }

        .layout-container { display: flex; flex: 1; overflow: hidden; min-height: 0; }
        
        /* Navigation */
        nav.sidebar { display: none; width: 260px; background-color: var(--bg-nav); border-right: 1px solid var(--border-color); flex-direction: column; padding: 20px 0; overflow-y: auto; }
        nav.sidebar .nav-item { display: flex; align-items: center; text-decoration: none; color: var(--text-muted); padding: 14px 24px; gap: 16px; font-size: 1rem; font-weight: 500; transition: all 0.2s; cursor: pointer; }
        nav.sidebar .nav-item:hover, nav.sidebar .nav-item.active { background-color: rgba(59, 130, 246, 0.05); color: var(--primary-color); border-right: 3px solid var(--primary-color); }
        
        nav.bottom-nav { display: flex; background-color: var(--bg-nav); border-top: 1px solid var(--border-color); min-height: 65px; height: calc(65px + env(safe-area-inset-bottom)); width: 100%; overflow-x: auto; overflow-y: hidden; scroll-behavior: smooth; padding: 0 10px; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); position: relative; z-index: 100; }
        nav.bottom-nav .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: var(--text-muted); min-width: 72px; padding: 8px 4px; gap: 4px; font-size: 0.75rem; font-weight: 600; transition: all 0.2s; cursor: pointer; }
        nav.bottom-nav .nav-item.active { color: var(--primary-color); }
        .nav-icon { width: 24px; height: 24px; fill: currentColor; }

        /* Main Scroll Area */
        .main-scroll-area { flex: 1; overflow-y: auto; padding: 20px; background-color: var(--bg-body); position: relative; }
        .container-inner { max-width: 800px; margin: 0 auto; width: 100%; }

        /* Search & Actions */
        .top-actions { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
        .search-container { flex: 1; display: flex; align-items: center; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 12px; padding: 0 16px; transition: all 0.3s ease; box-shadow: var(--shadow-sm); }
        .search-container:focus-within { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        .search-container input { border: none; background: transparent; width: 100%; padding: 14px 0 14px 12px; color: var(--text-main); font-size: 1rem; outline: none; font-family: 'Inter', sans-serif; }
        .search-container input::placeholder { color: var(--text-muted); }

        .btn-fab { background: var(--primary-color); color: white; border: none; width: 48px; height: 48px; border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: var(--shadow-md); transition: all 0.2s; flex-shrink: 0; }
        .btn-fab:active { transform: scale(0.95); }

        /* Quick Type Select Bar */
        .segmented-control { display: flex; background: var(--input-bg); padding: 4px; border-radius: 10px; margin-bottom: 20px; gap: 4px; border: 1px solid var(--border-color); }
        .segment-btn { flex: 1; border: none; background: transparent; padding: 10px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all 0.2s; text-align: center; }
        .segment-btn.active { background: var(--bg-surface); color: var(--primary-color); box-shadow: var(--shadow-sm); }

        /* Parties Grid & Cards */
        .parties-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .party-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; gap: 14px; position: relative; }
        .party-card:hover { box-shadow: var(--shadow-md); }
        
        .party-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .party-info { flex: 1; padding-right: 12px; }
        .party-title { font-weight: 800; font-size: 1.15rem; color: var(--text-main); line-height: 1.3; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        
        .party-badge { font-size: 0.65rem; text-transform: uppercase; font-weight: 800; padding: 4px 8px; border-radius: 6px; letter-spacing: 0.5px; display: inline-block; }
        .party-badge.customer { background: rgba(59, 130, 246, 0.1); color: var(--primary-color); }
        .party-badge.supplier { background: rgba(16, 185, 129, 0.1); color: var(--success-color); }
        
        .party-meta { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
        .party-meta div { display: flex; align-items: center; gap: 6px; }
        .party-meta .material-symbols-outlined { font-size: 16px; color: var(--text-muted); }
        
        .party-balance-box { text-align: right; min-width: 90px; display: flex; flex-direction: column; align-items: flex-end; }
        .party-balance-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 700; margin-bottom: 2px; }
        .party-balance-val { font-size: 1.3rem; font-weight: 800; color: var(--text-main); line-height: 1.1; }
        .party-balance-val.receivable { color: var(--success-color); }
        .party-balance-val.payable { color: var(--danger-color); }
        
        .party-footer { display: flex; justify-content: flex-end; align-items: center; border-top: 1px solid var(--border-color); padding-top: 12px; gap: 10px; }
        
        .btn-card-action { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-muted); width: 38px; height: 38px; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .btn-card-action:active { transform: scale(0.9); }
        .btn-call { color: var(--success-color); background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); }
        .btn-edit { color: var(--accent-color); background: rgba(14, 165, 233, 0.1); border-color: rgba(14, 165, 233, 0.2); }
        .btn-delete { color: var(--danger-color); background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); }

        /* Skeletons */
        .skeleton { background: linear-gradient(90deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Modals Structure */
        .modal { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background-color: var(--bg-body); z-index: 2000; transition: right 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); overflow-y: auto; padding-bottom: 80px; }
        .modal.active { right: 0; }
        .modal-header { display: flex; align-items: center; gap: 15px; padding: 18px 20px; background: var(--bg-surface); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border-color); justify-content: space-between;}
        .close-modal { background: none; border: none; color: var(--text-main); cursor: pointer; display: flex; padding: 8px; border-radius: 50%; margin-left: -8px; }
        .modal-header h2 { margin: 0; font-size: 1.25em; font-weight: 700; }

        /* Mini Confirmation Overlays */
        .mini-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(15, 23, 42, 0.6); z-index: 4000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; backdrop-filter: blur(4px); }
        .mini-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .mini-modal-content { background: var(--bg-surface); width: 92%; max-width: 400px; border-radius: 24px; padding: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); transform: scale(0.95); transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid var(--border-color); }
        .mini-modal-overlay.active .mini-modal-content { transform: scale(1); }

        .form-group { padding: 20px; max-width: 800px; margin: 0 auto; }
        .input-wrapper { margin-bottom: 20px; }
        .input-wrapper label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.85em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper input, .input-wrapper select { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-size: 1rem; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s ease; }
        .input-wrapper input:focus, .input-wrapper select:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        .row-inputs { display: flex; gap: 16px; }
        .row-inputs > div { flex: 1; }

        .btn-primary { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary-color); color: white; font-size: 1.1em; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: all 0.2s; box-shadow: 0 4px 10px rgba(30, 64, 175, 0.2); }
        .btn-primary:active:not(:disabled) { transform: translateY(2px); box-shadow: none; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Toasts */
        .toast-msg { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -20px); color: white; padding: 12px 24px; border-radius: 8px; z-index: 9999; display: none; font-weight: 600; font-size: 0.95em; align-items: center; gap: 10px; opacity: 0; transition: all 0.3s; box-shadow: var(--shadow-lg); }
        .toast-msg.error { background: var(--danger-color); }
        .toast-msg.success { background: var(--success-color); }
        .toast-msg.show { display: flex; opacity: 1; transform: translate(-50%, 0); }

        #scrollLoader { text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; display: none; align-items: center; justify-content: center; gap: 10px; }

        @media (min-width: 768px) {
            #app-shell { flex-direction: column; }
            .layout-container { flex-direction: row; }
            nav.bottom-nav { display: none; }
            nav.sidebar { display: flex; }
            .parties-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="toast-msg error" id="errorToast"><span class="material-symbols-outlined">error</span><span id="errorToastText">Error</span></div>
    <div class="toast-msg success" id="successToast"><span class="material-symbols-outlined">check_circle</span><span id="successToastText">Success</span></div>

    <div id="app-shell">
        <header>
            <div class="header-left">
                <img src="images/icon.png" alt="Logo" class="company-logo" onerror="this.src='https://via.placeholder.com/40'">
                <h1>PARTIES</h1>
            </div>
            <div class="header-right">
                <div class="filter-toggle" id="btnBalanceFilter" onclick="vibrateApp(10); toggleBalanceFilter()" title="Show Outstanding Balance Only">
                    <span class="material-symbols-outlined">account_balance_wallet</span>
                    <div class="filter-badge"></div>
                </div>
            </div>
        </header>

        <div class="layout-container">
            <nav class="sidebar" id="desktop-nav"></nav>

            <div class="main-scroll-area" id="mainScroll">
                <div class="container-inner">
                    
                    <div class="top-actions">
                        <div class="search-container">
                            <span class="material-symbols-outlined">search</span>
                            <input type="text" id="searchInput" placeholder="Search customer or supplier..." autocomplete="off">
                        </div>
                        <button class="btn-fab" onclick="openPartyModal()" title="Add New Party">
                            <span class="material-symbols-outlined">person_add</span>
                        </button>
                    </div>

                    <div class="segmented-control">
                        <button class="segment-btn active" id="segAll" onclick="vibrateApp(10); changeTypeSegment('ALL')">All Profiles</button>
                        <button class="segment-btn" id="segCustomers" onclick="vibrateApp(10); changeTypeSegment('Customer')">Customers</button>
                        <button class="segment-btn" id="segSuppliers" onclick="vibrateApp(10); changeTypeSegment('Supplier')">Suppliers</button>
                    </div>

                    <div class="parties-grid" id="partiesGrid"></div>
                    
                    <div id="scrollLoader">
                        <span class="skeleton" style="width:16px; height:16px; border-radius:50%;"></span> Loading parties...
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav" id="mobile-nav"></nav>
    </div>

    <!-- Add / Edit Party Modal -->
    <div class="modal" id="modalParty">
        <div class="modal-header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="close-modal" onclick="history.back()"><span class="material-symbols-outlined">arrow_back</span></button>
                <h2 id="modalPartyTitle">Add New Party</h2>
            </div>
        </div>
        
        <div class="form-group">
            <input type="hidden" id="editPartyId">
            
            <div class="input-wrapper">
                <label>Party / Company Name *</label>
                <input type="text" id="partyName" placeholder="e.g. Balaji Beverages or John Doe">
            </div>

            <div class="input-wrapper">
                <label>Party Profile Type *</label>
                <select id="partyType">
                    <option value="Customer">Customer (Client / Retailer)</option>
                    <option value="Supplier">Supplier (Vendor / Raw Material)</option>
                </select>
            </div>
            
            <div class="row-inputs">
                <div class="input-wrapper">
                    <label>Phone Number *</label>
                    <input type="tel" id="partyPhone" placeholder="10-digit Mobile No">
                </div>
                <div class="input-wrapper">
                    <label>Opening Balance (₹)</label>
                    <input type="number" id="partyOpeningBalance" placeholder="0" value="0">
                </div>
            </div>

            <div class="input-wrapper">
                <label>Billing / Shipping Address</label>
                <input type="text" id="partyAddress" placeholder="Enter Full Location Details">
            </div>

            <button type="button" class="btn-primary" id="btnSaveParty" style="margin-top: 20px;">
                <span class="material-symbols-outlined">save</span>
                Save Party Profile
            </button>
        </div>
    </div>

    <!-- Delete Confirmation Mini Modal -->
    <div class="mini-modal-overlay" id="miniModalDelete">
        <div class="mini-modal-content">
            <div style="text-align: center;">
                <div style="width: 64px; height: 64px; background: rgba(239, 68, 68, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto;">
                    <span class="material-symbols-outlined" style="font-size: 32px; color: var(--danger-color);">delete_forever</span>
                </div>
                <h3 style="margin-bottom: 8px; font-size: 1.25rem; color: var(--text-main); font-weight: 700;">Delete Profile?</h3>
                <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 0.95rem; line-height: 1.5;">Are you sure? This will permanently remove this party record from all collection indices.</p>
                <input type="hidden" id="deleteTargetId">
                <div style="display: flex; gap: 12px;">
                    <button type="button" onclick="closeMiniModal('miniModalDelete')" style="flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-weight: 600; cursor: pointer; transition: all 0.2s;">Cancel</button>
                    <button type="button" id="btnConfirmDelete" class="btn-primary" onclick="executeDeleteParty()" style="flex: 1; background: var(--danger-color); box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2); border: none; padding: 12px;">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { app, db } from './config.js';
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { collection, doc, getDocs, query, orderBy, limit, startAfter, where, setDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        // Navigation Layout Architecture Map
        const navItems = [
            { name: 'Dashboard', path: 'index.html', icon: '<path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>' },
            { name: 'Billing', path: 'bill.html', icon: '<path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>' },
            { name: 'Production', path: 'production.html', icon: '<path d="M19.36 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.64-4.96zM10 17l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>' },
            { name: 'Inventory', path: 'inventory.html', icon: '<path d="M20 2H4c-1.1 0-2 .9-2 2v3.01c0 .72.43 1.34 1 1.69V20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8.7c.57-.35 1-.97 1-1.69V4c0-1.1-.9-2-2-2zm-5 12H9v-2h6v2zm5-7H4V4h16v3z"/>' },
            { name: 'Purchase', path: 'purchase.html', icon: '<path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>' },
            { name: 'Sales', path: 'sales.html', icon: '<path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/>' },
            { name: 'Parties', path: 'parties.html', icon: '<path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>' },
            { name: 'Expenses', path: 'expenses.html', icon: '<path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>' },
            { name: 'Accounts', path: 'accounts.html', icon: '<path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>' },
            { name: 'Labour', path: 'attendance.html', icon: '<path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>' }
        ];

        const desktopNav = document.getElementById('desktop-nav');
        const mobileNav = document.getElementById('mobile-nav');
        const currentPath = window.location.pathname.split('/').pop() || 'parties.html';

        navItems.forEach(item => {
            const isActive = currentPath === item.path ? 'active' : '';
            const html = `<a href="${item.path}" class="nav-item ${isActive}"><svg class="nav-icon" viewBox="0 0 24 24">${item.icon}</svg><span>${item.name}</span></a>`;
            desktopNav.innerHTML += html;
            mobileNav.innerHTML += html;
        });

        // Haptic Feedback Engine Simulation
        window.vibrateApp = function(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); };
        
        // System Notification Toasts
        window.showToast = function(msg, type = "success") {
            vibrateApp(type === "error" ? 40 : 20);
            const toast = document.getElementById(type === "error" ? 'errorToast' : 'successToast');
            document.getElementById(type === "error" ? 'errorToastText' : 'successToastText').innerText = msg;
            toast.style.display = 'flex';
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.style.display = 'none', 300);
            }, 3000);
        };

        // Modal Stack Operations
        window.openModal = function(modalId) {
            vibrateApp(20);
            document.getElementById(modalId).classList.add('active');
            history.pushState({ modal: modalId }, '', `#${modalId}`);
        };
        window.addEventListener('popstate', (e) => {
            document.querySelectorAll('.modal.active').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.mini-modal-overlay.active').forEach(m => m.classList.remove('active'));
            if (e.state && e.state.modal) document.getElementById(e.state.modal).classList.add('active');
        });

        window.openMiniModal = function(id) { vibrateApp(20); document.getElementById(id).classList.add('active'); };
        window.closeMiniModal = function(id) { document.getElementById(id).classList.remove('active'); };

        // Search Token Generator For Indexed Search Filters
        function generateSearchTokens(str1, str2) {
            const combined = `${str1 || ''} ${str2 || ''}`.toLowerCase().replace(/[.\/\\~*\[\]]/g, ' ');
            const words = combined.split(/[\s\-_]+/).filter(w => w.trim().length > 0);
            const tokens = {};
            words.forEach(w => {
                let prefix = '';
                for (let i = 0; i < w.length; i++) {
                    prefix += w[i];
                    tokens[prefix] = true;
                }
            });
            return tokens;
        }

        // Operational State Machines
        let currentUser = null;
        let partiesCache = [];
        let lastVisibleDoc = null;
        let isFetching = false;
        let hasMore = true;
        let currentSearch = '';
        let currentSegment = 'ALL'; // ALL | Customer | Supplier
        let isBalanceFilter = false;

        // Balance Quick Toggle Filter Logic
        window.toggleBalanceFilter = function() {
            const btn = document.getElementById('btnBalanceFilter');
            isBalanceFilter = !isBalanceFilter;
            if(isBalanceFilter) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
            loadParties(false);
        };

        // Segment Switch Engine
        window.changeTypeSegment = function(segment) {
            document.querySelectorAll('.segment-btn').forEach(btn => btn.classList.remove('active'));
            if(segment === 'ALL') document.getElementById('segAll').classList.add('active');
            if(segment === 'Customer') document.getElementById('segCustomers').classList.add('active');
            if(segment === 'Supplier') document.getElementById('segSuppliers').classList.add('active');
            
            currentSegment = segment;
            loadParties(false);
        };

        // Authentication Core Pipeline
        const auth = getAuth(app);
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loadParties();
            } else {
                window.location.replace('login.html');
            }
        });

        // Initialize Form Modal Operations
        window.openPartyModal = function(id = null) {
            if (id) {
                const item = partiesCache.find(p => p.id === id);
                if(!item) return;
                document.getElementById('modalPartyTitle').innerText = "Edit Party Profile";
                document.getElementById('editPartyId').value = id;
                document.getElementById('partyName').value = item.name || '';
                document.getElementById('partyType').value = item.partyType || 'Customer';
                document.getElementById('partyPhone').value = item.phone || '';
                document.getElementById('partyOpeningBalance').value = item.openingBalance || 0;
                document.getElementById('partyAddress').value = item.address || '';
            } else {
                document.getElementById('modalPartyTitle').innerText = "Add New Party";
                document.getElementById('editPartyId').value = '';
                document.getElementById('partyName').value = '';
                document.getElementById('partyType').value = 'Customer';
                document.getElementById('partyPhone').value = '';
                document.getElementById('partyOpeningBalance').value = '0';
                document.getElementById('partyAddress').value = '';
            }
            openModal('modalParty');
        };

        // Save / Update Operation Trigger
        document.getElementById('btnSaveParty').addEventListener('click', async () => {
            vibrateApp(30);
            const id = document.getElementById('editPartyId').value;
            const name = document.getElementById('partyName').value.trim();
            const partyType = document.getElementById('partyType').value;
            const phone = document.getElementById('partyPhone').value.trim();
            const openingBalance = parseFloat(document.getElementById('partyOpeningBalance').value) || 0;
            const address = document.getElementById('partyAddress').value.trim();

            if (!name || !phone || phone.length < 10) {
                showToast("Name and valid Phone are required.", "error"); return;
            }

            const btn = document.getElementById('btnSaveParty');
            btn.disabled = true; btn.innerHTML = "Processing...";

            try {
                const payload = {
                    name,
                    partyType,
                    phone,
                    openingBalance,
                    address,
                    searchTokens: generateSearchTokens(name, phone),
                    lastUpdated: new Date().toISOString()
                };

                if (id) {
                    const docRef = doc(db, "parties", id);
                    await updateDoc(docRef, payload);
                    showToast("Party configuration updated!", "success");
                } else {
                    payload.currentBalance = openingBalance; // Initialize working balance tracking parameter
                    payload.createdAt = serverTimestamp();
                    payload.createdBy = currentUser.displayName || "Operator";
                    
                    const docRef = doc(collection(db, "parties"));
                    await setDoc(docRef, payload);
                    showToast("New Party profile registered!", "success");
                }
                
                history.back();
                loadParties(false);
                
            } catch(err) {
                console.error(err);
                showToast("Database synchronization failed", "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span class="material-symbols-outlined">save</span> Save Party Profile`;
            }
        });

        // Delete Command Chain
        window.confirmDeleteParty = function(id) {
            vibrateApp(20);
            document.getElementById('deleteTargetId').value = id;
            openMiniModal('miniModalDelete');
        };

        window.executeDeleteParty = async function() {
            vibrateApp(30);
            const id = document.getElementById('deleteTargetId').value;
            if(!id) return;
            
            const btn = document.getElementById('btnConfirmDelete');
            btn.disabled = true; btn.innerText = "Deleting...";

            try {
                await deleteDoc(doc(db, "parties", id));
                showToast("Party profile deleted permanently.", "success");
                closeMiniModal('miniModalDelete');
                loadParties(false); 
            } catch(err) {
                console.error(err);
                showToast("Deletions restricted or failed", "error");
            } finally {
                btn.disabled = false; btn.innerText = "Delete";
            }
        };

        // Skeleton Shimmer Loading UI
        function renderSkeletons() {
            const grid = document.getElementById('partiesGrid');
            let html = '';
            for(let i=0; i<4; i++) {
                html += `
                <div class="party-card" style="border-color: transparent; box-shadow: none;">
                    <div style="display:flex; justify-content:space-between;">
                        <div style="flex:1;">
                            <div class="skeleton" style="height:22px; width:65%; margin-bottom:12px; border-radius:4px;"></div>
                            <div class="skeleton" style="height:14px; width:45%; margin-bottom:6px; border-radius:4px;"></div>
                            <div class="skeleton" style="height:14px; width:35%; border-radius:4px;"></div>
                        </div>
                        <div class="skeleton" style="height:35px; width:80px; border-radius:8px;"></div>
                    </div>
                </div>`;
            }
            grid.innerHTML = html;
        }

        // Data Fetching and Compiling Pipeline
        async function loadParties(isLoadMore = false) {
            if (isLoadMore) {
                if (isFetching || !hasMore) return;
                isFetching = true;
                document.getElementById('scrollLoader').style.display = 'flex';
            } else {
                hasMore = true;
                lastVisibleDoc = null;
                partiesCache = [];
                isFetching = true;
                renderSkeletons();
            }

            try {
                let q = collection(db, "parties");
                
                // 1. Core Segment Type Filtering
                if (currentSegment !== 'ALL') {
                    q = query(q, where("partyType", "==", currentSegment));
                }
                
                // 2. Outstanding Balance Condition Filter
                if (isBalanceFilter) {
                    q = query(q, where("currentBalance", "!=", 0));
                }
                
                // 3. Token-Based Multi-Word Search Engine Integration
                if (currentSearch !== '') {
                    const searchWords = currentSearch.replace(/[.\/\\~*\[\]]/g, ' ').split(/[\s\-_]+/).filter(w => w.trim().length > 0);
                    searchWords.forEach(word => {
                        q = query(q, where(`searchTokens.${word}`, "==", true));
                    });
                }
                
                // 4. Deterministic Index Order & Cursor Pagination Rules
                if (currentSearch !== '' || isBalanceFilter || currentSegment !== 'ALL') {
                    q = query(q, isLoadMore && lastVisibleDoc ? startAfter(lastVisibleDoc) : limit(10));
                } else {
                    q = query(q, orderBy("createdAt", "desc"), isLoadMore && lastVisibleDoc ? startAfter(lastVisibleDoc) : limit(10));
                }

                const snap = await getDocs(q);
                
                if (snap.empty) {
                    hasMore = false;
                    if (!isLoadMore) document.getElementById('partiesGrid').innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:40px; font-weight:500;">No matching parties profiles found.</div>';
                    document.getElementById('scrollLoader').style.display = 'none';
                    isFetching = false;
                    return;
                }

                lastVisibleDoc = snap.docs[snap.docs.length - 1];
                const newItems = [];
                snap.forEach(docSnap => {
                    const data = { id: docSnap.id, ...docSnap.data() };
                    if(!partiesCache.find(p => p.id === docSnap.id)) {
                        newItems.push(data);
                        partiesCache.push(data);
                    }
                });

                if (isLoadMore) renderPartiesAppend(newItems);
                else renderParties(newItems);
                
                document.getElementById('scrollLoader').style.display = 'none';

            } catch (err) {
                console.error(err);
                showToast("Data indexing configuration error.", "error");
            } finally {
                isFetching = false;
            }
        }

        // Render Cards View Engines
        function renderParties(items) {
            const grid = document.getElementById('partiesGrid');
            grid.innerHTML = '';
            items.forEach(item => grid.innerHTML += generatePartyCardHTML(item));
        }

        function renderPartiesAppend(items) {
            const grid = document.getElementById('partiesGrid');
            items.forEach(item => grid.innerHTML += generatePartyCardHTML(item));
        }

        function generatePartyCardHTML(item) {
            const badgeType = (item.partyType || 'Customer').toLowerCase();
            const bal = item.currentBalance || 0;
            
            let balanceClass = "";
            let balanceLabel = "Settled";
            if (bal > 0) {
                balanceClass = "receivable";
                balanceLabel = badgeType === 'customer' ? "Receivable" : "Advance Given";
            } else if (bal < 0) {
                balanceClass = "payable";
                balanceLabel = badgeType === 'customer' ? "Advance Taken" : "Payable Due";
            }

            return `
                <div class="party-card">
                    <div class="party-header">
                        <div class="party-info">
                            <div class="party-title">
                                ${item.name}
                            </div>
                            <span class="party-badge ${badgeType}">${item.partyType || 'Customer'}</span>
                            <div class="party-meta">
                                <div><span class="material-symbols-outlined">call</span>${item.phone || 'N/A'}</div>
                                <div><span class="material-symbols-outlined">location_on</span>${item.address || 'No Address Provided'}</div>
                            </div>
                        </div>
                        <div class="party-balance-box">
                            <span class="party-balance-label">${balanceLabel}</span>
                            <span class="party-balance-val ${balanceClass}">₹${Math.abs(bal).toLocaleString('en-IN', {minimumFractionDigits:2})}</span>
                        </div>
                    </div>
                    <div class="party-footer">
                        <!-- Direct Native Call Logic Integration Only -->
                        <a href="tel:${item.phone}" class="btn-card-action btn-call" onclick="vibrateApp(15)" title="Call Party">
                            <span class="material-symbols-outlined" style="font-size: 18px;">call</span>
                        </a>
                        <button class="btn-card-action btn-edit" onclick="vibrateApp(20); openPartyModal('${item.id}')" title="Edit Profile">
                            <span class="material-symbols-outlined" style="font-size: 18px;">edit</span>
                        </button>
                        <button class="btn-card-action btn-delete" onclick="vibrateApp(20); confirmDeleteParty('${item.id}')" title="Delete Profile">
                            <span class="material-symbols-outlined" style="font-size: 18px;">delete</span>
                        </button>
                    </div>
                </div>
            `;
        }

        // Endless Infinite Scroll Listener Implementation
        document.getElementById('mainScroll').addEventListener('scroll', (e) => {
            const el = e.target;
            if (el.scrollHeight - el.scrollTop <= el.clientHeight + 80) loadParties(true); 
        });

        // Search Debounce Matrix
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentSearch = e.target.value.toLowerCase().trim();
                loadParties(false);
            }, 400); 
        });

    </script>
</body>
</html>
