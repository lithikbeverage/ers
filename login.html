<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - LITHIK BEVERAGE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables for Auto Dark/Light Mode */
        :root {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary-color: #1e40af; /* A deep, rich, professional navy blue */
            --border-color: #e2e8f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #020617;
                --surface-color: #0f172a;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --primary-color: #2563eb; /* Darker, more professional blue for dark mode */
                --border-color: #1e293b;
            }
        }

        /* Strict Layout Rules: No copy */
        * {
            box-sizing: border-box;
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* IE10+/Edge */
            user-select: none;         /* Standard */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh; /* Changed to min-height so mobile can expand */
            width: 100vw;
            
            /* Allow scrolling but completely hide the scrollbar */
            overflow-y: auto;
            overflow-x: hidden;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
            
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        body::-webkit-scrollbar {
            display: none;
        }

        /* Full Screen Split Layout */
        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 100vh; /* Mobile Fix: Allows natural stacking without squishing */
        }

        .left-panel {
            flex: 0 1 auto;
            background-color: var(--surface-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px 30px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-color: var(--bg-color);
        }

        /* Branding Elements */
        .company-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 24px;
            pointer-events: none; /* Prevents dragging the image */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-weight: 800;
            font-size: 2rem;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
            color: var(--primary-color);
        }

        .tagline {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 300px;
            margin: 0;
        }

        /* Auth Container to keep right side tidy */
        .auth-content {
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .auth-content h2 {
            font-size: 1.8rem;
            margin: 0 0 8px 0;
        }

        .auth-content p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        /* Buttons & Inputs */
        button {
            width: 100%;
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: opacity 0.2s, transform 0.1s;
            position: relative;
        }

        button:active:not(:disabled) {
            opacity: 0.8;
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Loading Spinner CSS */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none; /* Hidden by default */
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        input {
            width: 100%;
            background-color: var(--surface-color);
            color: var(--text-main);
            border: 2px solid var(--border-color);
            padding: 16px;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            margin-bottom: 20px;
            -webkit-user-select: auto; /* Allow selecting text inside input only */
            user-select: auto;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        /* New User Setup Section (Hidden by default) */
        #setup-section {
            display: none;
        }

        .profile-pic {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            margin-bottom: 20px;
            object-fit: cover;
        }

        /* PC / Desktop Layout Adjustments */
        @media (min-width: 768px) {
            body {
                overflow: hidden; /* Lock scrolling completely on large screens */
            }

            .container {
                flex-direction: row;
                height: 100vh;
            }

            .left-panel {
                flex: 1; /* PC Fix: Restores the perfect 50/50 split on large screens */
                border-bottom: none;
                border-right: 1px solid var(--border-color);
                padding: 60px;
            }

            .right-panel {
                flex: 1; /* PC Fix: Restores the perfect 50/50 split on large screens */
                padding: 60px;
            }

            .company-logo {
                width: 160px;
                height: 160px;
            }

            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <img src="images/icon.jpg" alt="Company Logo" class="company-logo" onerror="this.src='https://via.placeholder.com/160?text=Logo'">
            <h1>LITHIK BEVERAGE</h1>
            <p class="tagline">Factory Operations & Inventory Management</p>
        </div>

        <div class="right-panel">
            
            <div id="login-section" class="auth-content">
                <h2>Welcome Back</h2>
                <p>Sign in to access your dashboard</p>
                
                <button id="google-login-btn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    <span id="login-btn-text">Continue with Google</span>
                    <div id="login-spinner" class="spinner"></div>
                </button>
            </div>

            <div id="setup-section" class="auth-content">
                <img id="user-profile-pic" src="" alt="User Profile" class="profile-pic">
                <h2>Account Setup</h2>
                <p>Please confirm your full name.</p>
                
                <input type="text" id="user-name-input" placeholder="Your Full Name">
                <button id="save-user-btn">
                    <span id="save-btn-text">Save & Enter Dashboard</span>
                    <div id="save-spinner" class="spinner"></div>
                </button>
            </div>

        </div>
    </div>

    <script type="module">
        import { app, db } from './config.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // UI Elements
        const loginSection = document.getElementById('login-section');
        const setupSection = document.getElementById('setup-section');
        const loginBtn = document.getElementById('google-login-btn');
        const saveBtn = document.getElementById('save-user-btn');
        const profilePicImg = document.getElementById('user-profile-pic');
        const nameInput = document.getElementById('user-name-input');
        
        // Spinner Elements
        const loginSpinner = document.getElementById('login-spinner');
        const loginBtnText = document.getElementById('login-btn-text');
        const saveSpinner = document.getElementById('save-spinner');
        const saveBtnText = document.getElementById('save-btn-text');

        let pendingUserData = null;

        // Step 1: Handle Google Login
        loginBtn.addEventListener('click', async () => {
            try {
                // UI Loading State
                loginBtn.disabled = true;
                loginSpinner.style.display = 'block';
                loginBtnText.innerText = "Signing in...";

                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                const userDocRef = doc(db, "users", user.uid);
                const userDocSnap = await getDoc(userDocRef);

                if (userDocSnap.exists()) {
                    window.location.href = 'index.html';
                } else {
                    pendingUserData = user;
                    
                    loginSection.style.display = 'none';
                    setupSection.style.display = 'block';
                    
                    profilePicImg.src = user.photoURL || 'https://via.placeholder.com/90';
                    nameInput.value = user.displayName || '';
                    
                    // Reset button state just in case
                    loginBtn.disabled = false;
                    loginSpinner.style.display = 'none';
                    loginBtnText.innerText = "Continue with Google";
                }
            } catch (error) {
                console.error("Login failed:", error);
                alert("Failed to sign in. Please try again.");
                // Revert UI State on Error
                loginBtn.disabled = false;
                loginSpinner.style.display = 'none';
                loginBtnText.innerText = "Continue with Google";
            }
        });

        // Step 2: Save New User
        saveBtn.addEventListener('click', async () => {
            const finalName = nameInput.value.trim();
            
            if (!finalName) {
                alert("Please enter your name.");
                return;
            }

            try {
                // UI Loading State
                saveBtn.disabled = true;
                saveSpinner.style.display = 'block';
                saveBtnText.innerText = "Setting up account...";

                await setDoc(doc(db, "users", pendingUserData.uid), {
                    uid: pendingUserData.uid,
                    name: finalName,
                    email: pendingUserData.email,
                    photoURL: pendingUserData.photoURL,
                    role: "pending", 
                    createdAt: new Date().toISOString()
                });

                window.location.href = 'index.html';

            } catch (error) {
                console.error("Failed to save user:", error);
                alert("Could not save profile. Check connection.");
                // Revert UI State on Error
                saveBtn.disabled = false;
                saveSpinner.style.display = 'none';
                saveBtnText.innerText = "Save & Enter Dashboard";
            }
        });
    </script>
</body>
</html>
